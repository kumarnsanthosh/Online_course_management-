{% extends 'base.html' %}
{% load static %}
{% block body %}
<div class="min-h-screen flex items-center justify-center  p-4">
  <form method="POST" enctype="multipart/form-data"
        class="bg-slate-900 p-6 rounded-xl shadow-md w-full max-w-lg space-y-4">

    {% csrf_token %}

    <h2 class="text-xl text-white font-bold text-center">Update Profile</h2>


    <div class="text-center">
      {% if profile.profile_pic %}
        <img src="{{ profile.profile_pic.url }}" class="w-24 h-24 rounded-full mx-auto object-cover">
      {% else %}
        <img src="{% static 'images/user-image.png' %}" class="w-24 h-24 rounded-full mx-auto">
      {% endif %}
    </div>

   
    <input type="file" name="profile_pic" class="w-full border text-white p-2 rounded">

    
    <input type="text" name="phone" value="{{ profile.phone }}"
           placeholder="Phone"
           class="w-full  border p-2 rounded">

    
    <input type="text" name="address" value="{{ profile.address }}"
           placeholder="Address"
           class="w-full border p-2 rounded">

    
    <textarea name="bio" placeholder="Bio"
              class="w-full border p-2 rounded">{{ profile.bio }}</textarea>

    
    <button type="submit"
            class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700">
      Save Changes
    </button>

  </form>
</div>
{% endblock %}
