{% extends 'base.html' %}

{% block body %}
<div class="min-h-screen flex items-center justify-center bg-gray-100 p-4">
  <form method="POST" enctype="multipart/form-data" class="bg-white p-6 rounded-xl shadow-md w-full max-w-md space-y-4">
    {% csrf_token %}
    <h2 class="text-xl font-bold text-center">Hey {{user.username}}, Become Instructor</h2>
    <textarea name="description" placeholder="Description" class="w-full border p-2 rounded"></textarea>
    <div class="flex gap-6 bg-gray-400 shadow-xl rounded-xl items-center p-3">
      <label for="">Image:</label>
      <input class="bg-gray-300 rounded-xl shadow-xl"  type="file" name="image" class="w-full">
    </div>
    <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded">Create</button>
  </form>
</div>
{% endblock %}
