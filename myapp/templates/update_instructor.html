{% extends 'base.html' %}
{% load static %}

{% block body %}
<div class="min-h-screen flex items-center justify-center bg-gray-100 p-4">

  <form method="POST" enctype="multipart/form-data"
        class="bg-white p-6 rounded-xl shadow-md w-full max-w-md space-y-4">

    {% csrf_token %}

    <h2 class="text-xl font-bold text-center">Edit Instructor</h2>

    {% if instructor.image %}
      <img src="{{ instructor.image.url }}" class="w-24 h-24 rounded-full mx-auto">
    {% else %}
      <img src="{% static 'images/user-image.png' %}" class="w-24 h-24 rounded-full mx-auto">
    {% endif %}

    <input type="text" name="name" value="{{ instructor.name }}"
           class="w-full border p-2 rounded">

    <textarea name="description"
              class="w-full border p-2 rounded">{{ instructor.description }}</textarea>

    <input type="file" name="image">

    <button type="submit"
            class="w-full bg-blue-600 text-white py-2 rounded">
      Update
    </button>

  </form>

</div>
{% endblock %}
