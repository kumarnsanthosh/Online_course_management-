{% extends 'base.html' %}
{% load static %}

{% block body %}
<div class="min-h-screen bg-gray-100 flex items-center justify-center p-4">

  <div class="bg-white shadow-lg rounded-xl w-full max-w-2xl p-6">

    <h2 class="text-2xl font-bold mb-6 text-center">Edit Course</h2>

    <form method="POST" enctype="multipart/form-data" class="space-y-4">
      {% csrf_token %}

      <!-- Course Name -->
      <div>
        <label class="block mb-1 font-medium">Course Name</label>
        {{ form.name }}
      </div>

      <!-- Current Image -->
      <div>
        <label class="block mb-1 font-medium">Current Image</label>
        {% if course.image %}
          <img src="{{ course.image.url }}" class="w-40 h-28 object-cover rounded">
        {% else %}
          <img src="{% static 'images/course_image.webp' %}" class="w-40 h-28 object-cover rounded">
        {% endif %}
      </div>

      <!-- Upload New Image -->
      <div>
        <label class="block mb-1 font-medium">Change Image</label>
        {{ form.image }}
      </div>

      <!-- Video -->
      <div>
        <label class="block mb-1 font-medium">Course Video</label>
        {{ form.video }}
      </div>

      <!-- Category -->
      <div>
        <label class="block mb-1 font-medium">Category</label>
        {{ form.category }}
      </div>

      <!-- Description -->
      <div>
        <label class="block mb-1 font-medium">Description</label>
        {{ form.description }}
      </div>

      <!-- Price -->
      <div>
        <label class="block mb-1 font-medium">Price</label>
        {{ form.price }}
      </div>

      <!-- Hours -->
      <div>
        <label class="block mb-1 font-medium">Hours</label>
        {{ form.hours }}
      </div>

      <!-- Submit -->
      <div class="flex justify-between items-center pt-4">
        <a href="{% url 'myapp:instructor' %}" class="text-gray-500 hover:underline">
          Cancel
        </a>

        <button type="submit"
                class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition">
          Update Course
        </button>
      </div>

    </form>

  </div>

</div>
{% endblock %}
